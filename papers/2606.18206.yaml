desc: Introduces FPRM, a Transformer-based Fixed-Point Reasoning Model that repeatedly
  applies a looped reasoning block and uses fixed-point convergence as an end-to-end
  halting signal, adapting test-time compute to task difficulty on Sudoku, Maze, state-tracking,
  and ARC-AGI benchmarks.
