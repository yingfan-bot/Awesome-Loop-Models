desc: Analyzes compression of TRM/HRM recursive reasoners, finding that naïve INT4,
  pruning, distillation, and linear attention can preserve cell accuracy while collapsing
  puzzle-exact accuracy; calibrated per-channel INT4 largely recovers Sudoku performance,
  and carry-trajectory fidelity diagnoses the damage.
