desc: Presents Huginn, a 3.5B-parameter recurrent-depth language model trained on
  800B tokens whose shared core can be unrolled to variable depth; reasoning performance
  improves with additional test-time recurrences, and the architecture supports zero-shot
  adaptive compute and KV-cache sharing.
