desc: Introduces LoopWM, a world-model architecture that iteratively refines latent
  environment states through a parameter-shared Transformer block, using adaptive
  computation to scale latent depth per prediction step and reporting up to 100x parameter
  efficiency over conventional world-modeling approaches.
