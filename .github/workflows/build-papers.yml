name: Build generated repo artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML files
        run: |
          python3 - << 'EOF'
          """Validate catalog source YAML files without writing generated artifacts."""

          from scripts import build

          papers = build.load_papers()
          blogs = build.load_blogs()
          print(f"Validated {len(papers)} paper YAML files and {len(blogs)} blog YAML files")
          EOF

      - name: Check new free-form tags need review
        if: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'allow-new-tags') }}
        run: |
          git fetch --no-tags --prune --depth=1 origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
          python3 - << 'EOF'
          """Reject new free-form PR tags until a maintainer applies the review label."""

          import os
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          REVIEW_LABEL = "allow-new-tags"
          BASE_REF = f"origin/{os.environ['GITHUB_BASE_REF']}"
          FREE_FORM_TAG_FIELDS = ("domain_tags", "tags")

          def add_tag_values(tags, value):
              """Add normalized string tag values from a scalar or list field."""
              if value is None:
                  return
              values = [value] if isinstance(value, str) else value
              if not isinstance(values, list):
                  return
              for item in values:
                  if isinstance(item, str) and item.strip():
                      tags.add(item.strip())

          def collect_from_data(data):
              """Collect free-form tag values from a loaded YAML document."""
              collected = {field: set() for field in FREE_FORM_TAG_FIELDS}
              if not isinstance(data, dict):
                  return collected
              for field in FREE_FORM_TAG_FIELDS:
                  add_tag_values(collected[field], data.get(field))
              return collected

          def merge_tags(target, source):
              """Merge collected free-form tag sets by field."""
              for field in FREE_FORM_TAG_FIELDS:
                  target[field].update(source[field])

          def collect_worktree_tags():
              """Collect free-form tags from the PR checkout."""
              collected = {field: set() for field in FREE_FORM_TAG_FIELDS}
              for root in ("papers", "blogs"):
                  for path in sorted(Path(root).glob("*.yaml")):
                      if path.name.startswith("_"):
                          continue
                      data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
                      merge_tags(collected, collect_from_data(data))
              return collected

          def collect_git_tags(ref):
              """Collect free-form tags from YAML files at a git ref."""
              collected = {field: set() for field in FREE_FORM_TAG_FIELDS}
              result = subprocess.run(
                  ["git", "ls-tree", "-r", "--name-only", ref, "papers", "blogs"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              for filename in result.stdout.splitlines():
                  path = Path(filename)
                  if path.suffix != ".yaml" or path.name.startswith("_"):
                      continue
                  blob = subprocess.run(
                      ["git", "show", f"{ref}:{filename}"],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  data = yaml.safe_load(blob.stdout) or {}
                  merge_tags(collected, collect_from_data(data))
              return collected

          base_tags = collect_git_tags(BASE_REF)
          current_tags = collect_worktree_tags()
          new_tags = {
              field: sorted(current_tags[field] - base_tags[field])
              for field in FREE_FORM_TAG_FIELDS
          }
          if any(new_tags.values()):
              print("::error::This PR introduces new free-form tags.")
              print(f"Maintainer review is required. If the new tags are intentional, add the `{REVIEW_LABEL}` label and rerun CI.")
              for field, values in new_tags.items():
                  if values:
                      print(f"{field}: {', '.join(values)}")
              sys.exit(1)

          print("No new free-form tags detected.")
          EOF

      - name: Require Semantic Scholar API key
        if: ${{ github.event_name != 'pull_request' }}
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          if [ -z "${SEMANTIC_SCHOLAR_API_KEY}" ]; then
            echo "Missing repository secret: SEMANTIC_SCHOLAR_API_KEY" >&2
            exit 1
          fi

      - name: Fetch citation counts and GitHub stars
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python3 scripts/fetch_metrics.py

      - name: Build papers.json, submission-meta.json, README.md, and TAGS.md
        run: python3 scripts/build.py

      - name: Check static asset budgets
        run: python3 scripts/check_asset_budgets.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -t . -p 'test_*.py'

      - name: Commit metrics and generated files (on main only)
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers
          git add -f papers.json submission-meta.json README.md TAGS.md
          git diff --cached --quiet || git commit -m "chore: update metrics and generated artifacts [skip ci]"
          git push
